<!DOCTYPE html>
<html>

<head>
<title>Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

/* Calculator Box */

.calculator{
background:#222;
padding:20px;
border-radius:10px;
text-align:center;
}

/* Title */

.calculator h2{
color:white;
margin-bottom:10px;
}

/* Display */

#display{
width:100%;
height:50px;
font-size:20px;
margin-bottom:15px;
text-align:right;
padding:10px;
border:none;
border-radius:5px;
}

/* Button Grid */

.buttons{
display:grid;
grid-template-columns:repeat(4,60px);
gap:10px;
}

/* Buttons */

button{
height:50px;
font-size:18px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* Hover effect */

button:hover{
background:#ddd;
}

/* Operator Buttons */

.operator{
background:#ff9500;
color:white;
}

/* Equal Button */

.equal{
background:green;
color:white;
}

/* Clear Button */

.clear{
background:red;
color:white;
}

</style>

</head>

<body>

<div class="calculator">

<h2>Calculator</h2>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="addNumber('/')">/</button>
<button class="operator" onclick="addNumber('*')">*</button>
<button class="operator" onclick="addNumber('-')">-</button>

<button onclick="addNumber('7')">7</button>
<button onclick="addNumber('8')">8</button>
<button onclick="addNumber('9')">9</button>
<button class="operator" onclick="addNumber('+')">+</button>

<button onclick="addNumber('4')">4</button>
<button onclick="addNumber('5')">5</button>
<button onclick="addNumber('6')">6</button>
<button class="equal" onclick="calculate()">=</button>

<button onclick="addNumber('1')">1</button>
<button onclick="addNumber('2')">2</button>
<button onclick="addNumber('3')">3</button>
<button onclick="addNumber('0')">0</button>

<button onclick="addNumber('.')">.</button>

</div>

</div>

<script>

/* Add numbers */

function addNumber(num){
document.getElementById("display").value += num;
}

/* Clear display */

function clearDisplay(){
document.getElementById("display").value = "";
}

/* Calculate result */

function calculate(){
var result = document.getElementById("display").value;
document.getElementById("display").value = eval(result);
}

</script>

</body>

</html>
